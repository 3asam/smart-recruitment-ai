services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - ENV=local
      - PYTHONASYNCIODEBUG=0
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    networks:
      - recruitment-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

networks:
  recruitment-net:
    driver: bridge
